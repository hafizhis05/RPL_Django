{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pengguna</title>
    <link rel="stylesheet" href="{% static 'mahasiswa/css/style.css' %}">
    <style>
        :root {
            --bg: #eef4fb;
            --card: #ffffff;
            --primary: #2b6cb0;
            --primary-dark: #234e80;
            --text: #1f2937;
            --muted: #64748b;
            --border: rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.12), transparent 20%),
                        var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-shell {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            padding: 36px 32px;
        }

        .login-header {
            margin-bottom: 26px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            background: #f8fafc;
            font-size: 0.98rem;
            color: #0f172a;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--primary), #1e40af);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.2);
        }

        .messages {
            margin-bottom: 18px;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(248, 113, 113, 0.2);
            background: #fee2e2;
            color: #b91c1c;
            font-size: 0.95rem;
        }

        .info-text {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 16px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid rgba(129, 140, 248, 0.25);
        }

        .info-text code {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.12);
            color: #3730a3;
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="login-header">
                <h1>Login Pengguna</h1>
                <p>Masuk untuk mengakses halaman daftar mahasiswa.</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Masukkan username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Masukkan password"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">Masuk</button>
            </form>

            <div class="info-text">
                <strong>Contoh akun:</strong><br>
                Username: <code>admin</code> &nbsp;•&nbsp; Password: <code>123456789</code>
            </div>
        </div>
    </div>
</body>
</html>
